<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapFix - Blizlab</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <script src="../assets/components.js" defer></script>

    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/heic2any/dist/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <app-header></app-header>

    <main class="page-main">
        <div class="app-shell">
            
            <div class="app-header-row" style="margin-bottom: 30px;">
                <div class="app-brand">
                    <div class="app-brand-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm0 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm8.5-5h-2l-1.5-1.5h-5l-1.5 1.5h-2C6.12 7.5 5 8.62 5 10v9c0 1.38 1.12 2.5 2.5 2.5h11c1.38 0 2.5-1.12 2.5-2.5v-9c0-1.38-1.12-2.5-2.5-2.5zm1 11.5c0 .28-.22.5-.5.5h-11c-.28 0-.5-.22-.5-.5v-9c0-.28.22-.5.5-.5h2.41l.59-.59 1.5-1.5h3l1.5 1.5.59.59h2.41c.28 0 .5.22.5.5v9z"/>
                        </svg>
                    </div>
                    <div class="app-brand-text">Snap<span class="highlight">Fix</span></div>
                </div>
                <div style="text-align: right; color: #666; font-size: 0.9rem; max-width: 300px; line-height: 1.2;">
                    Batch optimizer for e-commerce.<br>Fixes color, resizes & watermarks.
                </div>
            </div>

            <div class="container">
                <div id="controlsArea" class="controls-area">
                    <div class="input-group">
                        <label for="wmInput">Watermark Text (Optional)</label>
                        <input type="text" id="wmInput" placeholder="e.g. Blizlab Store">
                    </div>
                    
                    <div class="upload-area">
                        <label for="fileInput" class="btn">Select Photos</label>
                        <input type="file" id="fileInput" multiple accept=".jpg, .jpeg, .png, .heic, .heif">
                    </div>
                </div>

                <div id="loader" class="loader"></div>
                
                <div id="actionArea" class="action-area" style="display: none;">
                    <button id="downloadBtn" class="btn download">Download ZIP</button>
                    <button id="resetBtn" class="btn secondary">Start Over</button>
                </div>

                <div class="gallery" id="gallery"></div>
            </div>
        </div>
    </main>

    <app-footer></app-footer>

    <div id="lightbox" class="lightbox">
        <span id="closeLightbox">&times;</span>
        <img id="lightboxImg" src="">
    </div>

    <script src="script.js"></script>
</body>
</html>
