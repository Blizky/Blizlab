<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Engagement Analytics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <h2 id="mainTitle">Video Interest Experiment</h2>

    <div id="setupSection">
        <input type="text" id="videoUrl" placeholder="Paste YouTube Link Here">
        <button id="loadBtn">Start Test</button>
    </div>

    <div id="player-wrapper">
        <div id="player"></div>
    </div>

    <div id="controls" style="display:none;">
        <div id="timerDisplay">00:00 / 01:00</div>
        <div class="slider-container">
            <div class="labels">
                <span>Bored</span>
                <span>Neutral</span>
                <span>Engaged</span>
            </div>
            <input type="range" id="interestSlider" min="-3" max="3" value="0" step="1">
            <span id="statusLabel">Neutral</span>
        </div>
    </div>

    <button id="submitBtn">Send & See Results</button>

    <div id="resultsArea" style="display:none; margin-top: 20px;">
        <h3>Community Average (Smoothed)</h3>
        <canvas id="avgChart"></canvas>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>
</body>
</html>
