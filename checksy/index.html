<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checksy — Handle Tab Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f1117; --panel: #131823; --text: #e7e9ee; --muted: #97a1aa;
      --accent: #5c8df6; --outline: #253048; --chip-bg: #1c212e;
    }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    h1 { margin-bottom: 10px; font-size: 1.6rem; }
    p { margin: 0 0 14px; color: var(--muted); }
    .alert {
      background: #273352; padding: 12px 16px; border-radius: 10px;
      margin-bottom: 16px; position: relative;
    }
    .alert button {
      position: absolute; top: 10px; right: 10px;
      background: #3d4a6b; color: white; border: none; border-radius: 6px;
      padding: 6px 10px; cursor: pointer;
    }
    .input-row {
      display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 20px;
    }
    input[type="text"] {
      background: #0b0f1a; color: var(--text); border: 1px solid var(--outline);
      border-radius: 10px; padding: 12px 14px; outline: none; font-size: 1rem;
    }
    button {
      background: var(--accent); color: white; border: none; border-radius: 10px;
      padding: 12px 16px; font-weight: 600; cursor: pointer;
    }
    .chip-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .chip {
      background: var(--chip-bg); border: 1px solid var(--outline);
      border-radius: 12px; padding: 10px; display: flex; align-items: center;
      gap: 10px; cursor: pointer; transition: background 0.2s;
    }
    .chip.disabled { opacity: 0.5; pointer-events: none; }
    .chip.active { border-color: var(--accent); background: #1f2a3f; }
    .chip img {
      width: 24px; height: 24px; border-radius: 4px;
    }
    .chip span { font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="alert" id="alertBox">
      ⚠️ To open tabs, your browser must allow popups for this page. If nothing opens, check your settings.
      <button onclick="dismissAlert()">Got it</button>
    </div>

    <h1>Checksy</h1>
    <p>Type a handle and select platforms to preview. Click “Open tabs” to launch selected profiles.</p>

    <div class="input-row">
      <input id="handleInput" type="text" placeholder="e.g., cutecats" />
      <button onclick="openTabs()">Open tabs</button>
    </div>

    <div class="chip-grid" id="chipGrid"></div>
  </div>

  <script>
    const SITES = [
      { name: 'YouTube',   url: 'https://www.youtube.com/@{u}', icon: 'https://www.youtube.com/s/desktop/fe2e6e3e/img/favicon.ico', enabled: true },
      { name: 'Instagram', url: 'https://www.instagram.com/{u}/', icon: 'https://www.instagram.com/static/images/ico/favicon-192.png/68d99ba29cc8.png', enabled: true },
      { name: 'TikTok',    url: 'https://www.tiktok.com/@{u}', icon: 'https://www.tiktok.com/favicon.ico', enabled: true },
      { name: 'Twitter',   url: 'https://twitter.com/{u}', icon: 'https://abs.twimg.com/favicons/twitter.ico', enabled: true },
      { name: 'Bluesky',   url: 'https://bsky.app/profile/{u}.bsky.social', icon: 'https://bsky.app/favicon.ico', enabled: false },
      { name: 'Twitch',    url: 'https://www.twitch.tv/{u}', icon: 'https://www.twitch.tv/favicon.ico', enabled: false },
      { name: 'Medium',    url: 'https://medium.com/@{u}', icon: 'https://medium.com/favicon.ico', enabled: false },
      { name: 'Patreon',   url: 'https://www.patreon.com/{u}', icon: 'https://www.patreon.com/favicon.ico', enabled: true },
      { name: 'Ko-fi',     url: 'https://ko-fi.com/{u}', icon: 'https://ko-fi.com/favicon.ico', enabled: true },
      { name: 'Buy Me a Coffee', url: 'https://www.buymeacoffee.com/{u}', icon: 'https://www.buymeacoffee.com/favicon.ico', enabled: true }
    ];

    const chipGrid = document.getElementById('chipGrid');
    const inputEl = document.getElementById('handleInput');

    function dismissAlert() {
      document.getElementById('alertBox').style.display = 'none';
    }

    function buildUrl(pattern, username) {
      return pattern.replace('{u}', encodeURIComponent(username));
    }

    function renderChips() {
      chipGrid.innerHTML = '';
      SITES.forEach((site, index) => {
        const chip = document.createElement('div');
        chip.className = 'chip' + (site.enabled ? ' active' : ' disabled');
        chip.dataset.index = index;
        chip.innerHTML = `
          <img src="${site.icon}" alt="${site.name} logo">
          <span>${site.name}</span>
        `;
        if (site.enabled) {
          chip.addEventListener('click', () => {
            chip.classList.toggle('active');
          });
        }
        chipGrid.appendChild(chip);
      });
    }

    function openTabs() {
      const username = inputEl.value.trim();
      if (!username) return;

      const activeChips = [...chipGrid.children].filter(c => c.classList.contains('active'));
      activeChips.forEach(chip => {
        const site = SITES[chip.dataset.index];
        const url = buildUrl(site.url, username);
        window.open(url, '_blank');
      });
    }

    renderChips();
    inputEl.value = 'cutecats';
  </script>
</body>
</html>
