<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checksy Grid</title>
  <style>
    body { font-family: sans-serif; background:#0f1117; color:#eee; margin:0; padding:20px; }
    h1 { margin-bottom:10px; }
    .input-row { margin-bottom:20px; }
    input { padding:8px; border-radius:6px; border:1px solid #444; }
    button { padding:8px 12px; margin-left:8px; border:none; border-radius:6px; background:#5c8df6; color:#fff; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    .card { background:#131823; border:1px solid #253048; border-radius:10px; overflow:hidden; }
    .card-header { padding:8px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #253048; }
    .card-header h3 { margin:0; font-size:1rem; }
    .card-header a { color:#5c8df6; text-decoration:none; font-size:0.9rem; }
    iframe { width:100%; height:200px; border:0; background:#0b0f1a; }
  </style>
</head>
<body>
  <h1>Checksy</h1>
  <div class="input-row">
    <input id="handle" type="text" placeholder="Enter username e.g. cutecats">
    <button onclick="render()">Check</button>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const SITES = [
      {name:'YouTube',   pattern:'https://www.youtube.com/@{u}'},
      {name:'Instagram', pattern:'https://www.instagram.com/{u}/'},
      {name:'TikTok',    pattern:'https://www.tiktok.com/@{u}'},
      {name:'Twitter',   pattern:'https://twitter.com/{u}'},
      {name:'Bluesky',   pattern:'https://bsky.app/profile/{u}.bsky.social'},
      {name:'(empty)',   pattern:''}, // placeholder for your missing site
      {name:'Patreon',   pattern:'https://www.patreon.com/{u}'},
      {name:'Ko-fi',     pattern:'https://ko-fi.com/{u}'},
      {name:'Buy Me a Coffee', pattern:'https://www.buymeacoffee.com/{u}'}
    ];

    function render() {
      const username = document.getElementById('handle').value.trim();
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      SITES.forEach(site => {
        const url = site.pattern ? site.pattern.replace('{u}', encodeURIComponent(username)) : '';
        const card = document.createElement('div');
        card.className = 'card';
        const header = document.createElement('div');
        header.className = 'card-header';
        header.innerHTML = `<h3>${site.name}</h3>` + (url ? `<a href="${url}" target="_blank">Open</a>` : '');
        card.appendChild(header);
        if (url) {
          const frame = document.createElement('iframe');
          frame.src = url;
          card.appendChild(frame);
        }
        grid.appendChild(card);
      });
    }

    // demo default
    document.getElementById('handle').value = 'cutecats';
    render();
  </script>
</body>
</html>
