<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checksy — Handle Tab Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      background: #0f1117;
      color: #e7e9ee;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input[type="text"] {
      flex: 1;
      background: #0b0f1a;
      color: #e7e9ee;
      border: 1px solid #253048;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
    }
    button {
      background: #5c8df6;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .chip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .chip {
      background: #1c212e;
      border: 1px solid #253048;
      border-radius: 999px;
      padding: 6px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .chip img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }
    .chip.active {
      background: #2a3550;
      border-color: #5c8df6;
    }
  </style>
</head>
<body>
  <h1>Checksy</h1>
  <div class="input-row">
    <input id="handleInput" type="text" placeholder="Enter username e.g. cutecats" />
    <button onclick="openTabs()">Open Tabs</button>
  </div>

  <div class="chip-grid" id="chipGrid"></div>

  <script>
    const SITES = [
      { name: 'YouTube',   key: 'youtube',   url: 'https://www.youtube.com/@{u}' },
      { name: 'Instagram', key: 'instagram', url: 'https://www.instagram.com/{u}/' },
      { name: 'TikTok',    key: 'tiktok',    url: 'https://www.tiktok.com/@{u}' },
      { name: 'Twitter',   key: 'twitter',   url: 'https://twitter.com/{u}' },
      { name: 'Bluesky',   key: 'bsky',      url: 'https://bsky.app/profile/{u}.bsky.social' },
      { name: 'Twitch',    key: 'twitch',    url: 'https://www.twitch.tv/{u}' },
      { name: 'Medium',    key: 'medium',    url: 'https://medium.com/@{u}' },
      { name: 'Patreon',   key: 'patreon',   url: 'https://www.patreon.com/{u}' },
      { name: 'Ko-fi',     key: 'ko-fi',     url: 'https://ko-fi.com/{u}' },
      { name: 'Buy Me a Coffee', key: 'buymeacoffee', url: 'https://www.buymeacoffee.com/{u}' }
    ];

    const chipGrid = document.getElementById('chipGrid');
    const inputEl = document.getElementById('handleInput');

    function buildUrl(pattern, username) {
      return pattern.replace('{u}', encodeURIComponent(username));
    }

    function renderChips() {
      chipGrid.innerHTML = '';
      SITES.forEach((site, index) => {
        const chip = document.createElement('div');
        chip.className = 'chip active';
        chip.dataset.index = index;

        const img = document.createElement('img');
        img.src = `image/${site.key}.png`; // <-- matches your 32x32 PNGs
        img.alt = site.name + ' icon';

        const label = document.createElement('span');
        label.textContent = site.name;

        chip.appendChild(img);
        chip.appendChild(label);

        chip.addEventListener('click', () => {
          chip.classList.toggle('active');
        });

        chipGrid.appendChild(chip);
      });
    }

    function openTabs() {
      const username = inputEl.value.trim();
      if (!username) return;

      const activeChips = [...chipGrid.children].filter(c => c.classList.contains('active'));
      activeChips.forEach(chip => {
        const site = SITES[chip.dataset.index];
        const url = buildUrl(site.url, username);
        window.open(url, '_blank');
      });
    }

    renderChips();
    inputEl.value = 'cutecats';
  </script>
</body>
</html>
