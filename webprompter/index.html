<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlizPrompter | Blizlab</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --blue: #0099CC; --yellow: #FFCC33; --white: #FDFDF9;
            --black: #1A1A1A; --red: #c03221;
        }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--black); color: var(--white); overflow: hidden;
        }
        
        /* EDIT MODE */
        #edit-mode { 
            padding: 20px; display: flex; flex-direction: column; height: 100vh; 
            background: var(--white); color: var(--black);
        }
        textarea { 
            flex-grow: 1; margin: 15px 0; padding: 15px; border: 2px solid var(--black);
            font-size: 18px; border-radius: 8px; resize: none;
        }
        .btn {
            background: var(--blue); color: white; border: none; padding: 15px 25px;
            font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1.1em;
        }

        /* PROMPTER MODE */
        #prompter-mode { display: none; height: 100vh; position: relative; }
        #scroll-container {
            height: 100%; overflow-y: scroll; padding: 40vh 50px;
            scroll-behavior: smooth;
        }
        #text-display { font-size: 50px; line-height: 1.5; white-space: pre-wrap; }
        .mirrored { transform: scaleX(-1); }

        /* OVERLAYS */
        #qr-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #status-bar {
            position: fixed; bottom: 10px; right: 10px; padding: 5px 15px;
            border-radius: 20px; font-size: 12px; font-weight: bold;
            background: var(--red); /* Default disconnected */
        }
        .guide-line {
            position: fixed; top: 40%; left: 0; width: 100%; height: 2px;
            background: var(--yellow); opacity: 0.5; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="edit-mode">
        <h1 style="color: var(--blue); margin: 0;">BlizPrompter</h1>
        <textarea id="script-input" placeholder="Paste your script here..."></textarea>
        <button class="btn" onclick="startSession()">Open Prompter & Connect Remote</button>
    </div>

    <div id="prompter-mode">
        <div class="guide-line"></div>
        <div id="scroll-container">
            <div id="text-display"></div>
        </div>
        <div id="status-bar">DISCONNECTED</div>
        
        <div id="qr-overlay" onclick="this.style.display='none'">
            <div id="qrcode" style="padding: 20px; background: white;"></div>
            <p style="color: var(--yellow); margin-top: 20px;">Scan with Phone to Control</p>
        </div>
    </div>

    <script>
        let peer, conn;
        let settings = JSON.parse(localStorage.getItem('blizSettings')) || {
            text: '', speed: 2, size: 50, mirrored: false
        };

        const input = document.getElementById('script-input');
        const display = document.getElementById('text-display');
        const container = document.getElementById('scroll-container');
        const status = document.getElementById('status-bar');

        // Load saved script
        input.value = settings.text;

        function startSession() {
            settings.text = input.value;
            saveSettings();
            
            document.getElementById('edit-mode').style.display = 'none';
            document.getElementById('prompter-mode').style.display = 'block';
            display.innerText = settings.text;
            applyVisuals();

            initP2P();
            document.documentElement.requestFullscreen();
        }

        function saveSettings() {
            localStorage.setItem('blizSettings', JSON.stringify(settings));
        }

        function applyVisuals() {
            display.style.fontSize = settings.size + 'px';
            display.className = settings.mirrored ? 'mirrored' : '';
        }

        function initP2P() {
            const peerId = 'bliz-' + Math.floor(Math.random() * 9999);
            peer = new Peer(peerId);

            peer.on('open', (id) => {
                const remoteUrl = `${window.location.href}?remote=${id}`;
                document.getElementById('qr-overlay').style.display = 'flex';
                new QRCode(document.getElementById("qrcode"), remoteUrl);
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
            });
        }

        function setupConnection() {
            conn.on('open', () => {
                status.style.background = '#2ecc71';
                status.innerText = 'CONNECTED';
                document.getElementById('qr-overlay').style.display = 'none';
            });

            conn.on('close', () => {
                status.style.background = '#e67e22'; // Orange
                status.innerText = 'RECONNECT NEEDED';
            });

            conn.on('data', (data) => {
                if(data.action === 'scroll') { /* handle start/stop */ }
                if(data.action === 'speed') { settings.speed = data.val; saveSettings(); }
                // etc...
            });
        }
    </script>
</body>
</html>
