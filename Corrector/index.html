<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Corrector — Blizlab</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="../assets/components.js" defer></script>
  <script src="../assets/apps_icons.js" defer></script>
</head>
<body>
  <app-header></app-header>
  <div class="status-pill" aria-live="polite">
    <span class="pill"><span class="status-dot" id="statusDot"></span><span id="status">Listo</span></span>
  </div>

  <main class="page-main">
    <section class="grid">
      <article class="panel">
        <header class="panel-header">
          <div class="panel-title">
            <h2 class="app-brand">
              <span class="app-brand-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 32 32">
                  <rect width="32" height="32" rx="5" ry="5" fill="#0099CC"/>
                  <g transform="translate(4,5) scale(1)">
                    <rect x="2" y="1" width="20" height="14" rx="3" fill="#ffcc33"/>
                    <text x="12" y="12" text-anchor="middle" font-size="7" fill="#0099CC" font-family="Arial, sans-serif">abc</text>
                  </g>
                </svg>
              </span>
              <span class="app-brand-text">#Correc<span class="highlight">tor</span></span>
            </h2>
            <div class="tool-subtitle" id="toolSubtitle">Pega tu texto, guardalo en Markdown o corrígelo.</div>
          </div>
          <div class="toolbar">
            <button id="run">Corregir</button>
            <button id="clear" type="button">Limpiar</button>
            <button id="copyOutput" class="primary" type="button">Copiar</button>
            <button id="saveMarkdown" class="primary" type="button">Guardar</button>
          </div>
        </header>
        <div class="stack">
          <div id="input" class="editor-input" contenteditable="true" spellcheck="false" data-placeholder="Pega tu texto aquí..."></div>
        </div>
        <div class="meta">
          <span id="wordCount">0 palabras</span>
          <span id="changeCount">0 cambios</span>
          <span>Rojo: cambios. Naranjo: sospechosas. Verde: revertidas.</span>
          <button id="openIgnored" class="link-button" type="button">Palabras ignoradas</button>
        </div>
      </article>
    </section>
  </main>

  <div class="modal" id="ignoredModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="ignoredTitle">
      <h3 id="ignoredTitle">Palabras ignoradas</h3>
      <p>Una palabra o frase por línea. Se ignorarán en futuras correcciones.</p>
      <textarea id="ignoredList" rows="6" placeholder="Ej: Loeb"></textarea>
      <div class="modal-actions">
        <button id="saveIgnored" class="primary" type="button">Guardar</button>
        <button id="closeIgnored" type="button">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof APP_ICONS === "undefined") return;
      document.querySelectorAll("[data-icon]").forEach((node) => {
        const key = node.dataset.icon;
        if (key && APP_ICONS[key]) {
          node.innerHTML = APP_ICONS[key];
        }
      });
    });
  </script>
  <app-footer></app-footer>
</body>
</html>
