<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TitleCut | YouTube Mobile Simulator</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="titlecut.css">
    <script src="../assets/components.js" defer></script>
</head>
<body>
    <app-header></app-header>
    <main class="page-main">
        <div class="tc-app">
            <div class="tc-shell">
                <div class="tc-shell-body">
                    <header class="tc-header">
                        <div class="app-brand">
                            <div class="app-brand-icon" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 32 32">
                                    <g transform="translate(3.9,4) scale(1)">
                                        <path fill="currentColor" d="M2 6.75A2.75 2.75 0 0 1 4.75 4h14.5A2.75 2.75 0 0 1 22 6.75v4.51a3.29 3.29 0 0 0-3.606.702l-5.903 5.903a3.7 3.7 0 0 0-.97 1.712l-.105.423H4.75A2.75 2.75 0 0 1 2 17.25zM16.5 8h-9a1.5 1.5 0 1 0 0 3h9a1.5 1.5 0 0 0 0-3m2.6 4.67-5.903 5.902a2.7 2.7 0 0 0-.706 1.247l-.458 1.831a1.087 1.087 0 0 0 1.319 1.318l1.83-.457a2.7 2.7 0 0 0 1.248-.707l5.902-5.902A2.286 2.286 0 0 0 19.1 12.67"/>
                                    </g>
                                </svg>
                            </div>
                            <div class="app-brand-text">Title<span class="highlight">Cut</span></div>
                        </div>
                    </header>

                    <div class="tc-main-grid">
            <section class="tc-input-section">
                <div class="tc-card">
                    <div class="tc-label-row">
                        <label id="lbl-title">Video Title</label>
                        <span class="tc-chars"><span id="charCount">0</span> <span id="lbl-chars">characters</span></span>
                    </div>
                    <textarea id="titleInput" placeholder="Paste your title here..."></textarea>
                </div>

                <aside class="tc-card tc-sidebar">
                    <h3 id="lbl-formula-title">Zeigarnik Formula</h3>
                    <div class="tc-formula-box">
                        Concrete Fact + Incomplete Hook = Clicks
                    </div>
                    <ul id="tc-tips-list" class="tc-tips">
                        <li>Visible part shows "what happened".</li>
                        <li>The cut (...) hides the reveal.</li>
                        <li>Don't finish the idea.</li>
                    </ul>
                </aside>
            </section>

            <section class="tc-sim-section">
                <div class="tc-card">
                    <div class="tc-label-row">
                        <label id="lbl-sim">Mobile Simulation (iPhone)</label>
                        <div class="tc-width-ctrl">
                            <input type="range" id="widthSlider" min="280" max="420" value="360">
                            <span id="widthDisplay">360px</span>
                        </div>
                    </div>

                    <div class="iphone-container">
                        <div class="yt-mobile-mock" id="ytMock">
                            <div class="yt-thumb">
                                <span class="yt-time">12:56</span>
                            </div>
                            <div class="yt-meta">
                                <div class="yt-avatar"></div>
                                <div class="yt-text">
                                    <h3 id="simTitle" class="yt-title-text"></h3>
                                    <p class="yt-sub">YouTube Channel • 105K views • 2 days ago</p>
                                </div>
                                <div class="yt-more">⋮</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </main>
    <app-footer></app-footer>
    <script src="titlecut.js"></script>
</body>
</html>
